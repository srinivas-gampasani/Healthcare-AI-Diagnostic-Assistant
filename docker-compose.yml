version: "3.9"
services:
  healthcare-ai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4-turbo-preview
      - PHI_MASKING_ENABLED=true
    volumes:
      - ./db:/app/db
      - ./outputs:/app/outputs
    restart: unless-stopped
